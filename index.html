<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>旅遊代購與購物清單</title>
<style>
  :root {
    --bg: #f4f5f7;
    --card-bg: #ffffff;
    --text: #1f2430;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --primary: #2563eb;
    --primary-dim: #eff6ff;
    --danger: #dc2626;
    --danger-dim: #fef2f2;
    --success: #16a34a;
    --success-dim: #f0fdf4;
    --warn: #d97706;
    --warn-dim: #fffbeb;
    --radius: 10px;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #14161c;
      --card-bg: #1d2029;
      --text: #e5e7eb;
      --text-dim: #9ca3af;
      --border: #2d313d;
      --primary: #60a5fa;
      --primary-dim: #1e2a3f;
      --danger: #f87171;
      --danger-dim: #3a1f1f;
      --success: #4ade80;
      --success-dim: #16261c;
      --warn: #fbbf24;
      --warn-dim: #3a2f14;
    }
  }
  :root[data-theme="dark"] {
    --bg: #14161c;
    --card-bg: #1d2029;
    --text: #e5e7eb;
    --text-dim: #9ca3af;
    --border: #2d313d;
    --primary: #60a5fa;
    --primary-dim: #1e2a3f;
    --danger: #f87171;
    --danger-dim: #3a1f1f;
    --success: #4ade80;
    --success-dim: #16261c;
    --warn: #fbbf24;
    --warn-dim: #3a2f14;
  }
  :root[data-theme="light"] {
    --bg: #f4f5f7;
    --card-bg: #ffffff;
    --text: #1f2430;
    --text-dim: #6b7280;
    --border: #e5e7eb;
    --primary: #2563eb;
    --primary-dim: #eff6ff;
    --danger: #dc2626;
    --danger-dim: #fef2f2;
    --success: #16a34a;
    --success-dim: #f0fdf4;
    --warn: #d97706;
    --warn-dim: #fffbeb;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang TC", "Microsoft JhengHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
  }
  .wrap {
    max-width: 980px;
    margin: 0 auto;
    padding: 20px 16px 80px;
  }
  h1 {
    font-size: 22px;
    margin: 4px 0 18px;
  }
  h2 { font-size: 17px; margin: 0 0 12px; }
  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 16px;
  }
  .sticky-trip-bar {
    position: sticky;
    top: 0;
    z-index: 50;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 8px 10px;
    margin-bottom: 16px;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.12);
  }
  .sticky-trip-bar select { flex: 0 1 220px; min-width: 120px; }
  .sticky-trip-bar > button { padding: 8px 12px; min-height: 36px; flex-shrink: 0; }
  .sticky-trip-bar .trip-meta { margin-top: 0; flex: 1 1 auto; }
  .row { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
  .row > * { min-width: 0; }
  label {
    font-size: 12px;
    color: var(--text-dim);
    display: block;
    margin-bottom: 4px;
  }
  input, select {
    width: 100%;
    padding: 8px 10px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
  }
  input[type="checkbox"] { width: auto; }
  button {
    cursor: pointer;
    border: none;
    border-radius: 8px;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 600;
    background: var(--primary);
    color: #fff;
    white-space: nowrap;
  }
  button.secondary {
    background: var(--primary-dim);
    color: var(--primary);
  }
  button.danger {
    background: var(--danger-dim);
    color: var(--danger);
  }
  button.ghost {
    background: transparent;
    color: var(--text-dim);
    padding: 4px 8px;
  }
  button:disabled { opacity: 0.5; cursor: not-allowed; }
  .tabs {
    display: flex;
    gap: 4px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 16px;
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  .tab-btn {
    background: transparent;
    color: var(--text-dim);
    border-radius: 8px 8px 0 0;
    padding: 10px 16px;
    font-weight: 600;
    white-space: nowrap;
    flex-shrink: 0;
  }
  .tab-btn.active {
    color: var(--primary);
    background: var(--primary-dim);
  }
  .field { flex: 1; }
  .badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }
  .badge.success { background: var(--success-dim); color: var(--success); }
  .badge.warn { background: var(--warn-dim); color: var(--warn); }
  .badge.danger { background: var(--danger-dim); color: var(--danger); }
  #daigouTableWrap, #selfTableWrap {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
  }
  table { width: 100%; min-width: 620px; border-collapse: collapse; font-size: 14px; }
  th, td { text-align: left; padding: 8px 6px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  th { color: var(--text-dim); font-weight: 600; font-size: 12px; }
  td.num { text-align: left; white-space: nowrap; }
  th.num { text-align: left; }
  .muted { color: var(--text-dim); font-size: 12px; }
  .empty {
    text-align: center;
    color: var(--text-dim);
    padding: 24px 12px;
    font-size: 14px;
  }
  .trip-meta {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 6px 16px;
    margin-top: 8px;
    font-size: 13px;
  }
  .trip-meta .tm-piece { white-space: nowrap; }
  .trip-meta b { font-size: 14px; color: var(--text); }
  .trip-meta input { width: auto; padding: 6px 8px; }
  .trip-meta button { padding: 6px 10px; min-height: 32px; }
  .add-form { display: flex; gap: 8px; flex-wrap: wrap; align-items: flex-end; margin-bottom: 14px; }
  .add-form .field { min-width: 110px; }
  .add-form .field.grow { flex: 2; min-width: 160px; }
  .link-cell a { color: var(--primary); font-size: 12px; }
  .reminder-group { margin-bottom: 20px; }
  .reminder-group h3 { font-size: 15px; margin: 0 0 8px; display: flex; align-items: center; gap: 8px; }
  .reminder-section {
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    margin-bottom: 10px;
    background: var(--bg);
  }
  .reminder-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .reminder-item:last-child { border-bottom: none; }
  .reminder-item .name { display: flex; align-items: center; gap: 8px; }
  .purchased-row {
    display: grid;
    grid-template-columns: 50px minmax(70px, 1fr) 90px 100px 84px 84px 64px 110px auto;
    align-items: center;
    column-gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .purchased-row:last-child { border-bottom: none; }
  .purchased-row .item-cell {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .purchased-row .store-cell {
    white-space: nowrap;
    color: var(--text-dim);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .purchased-row .client-cell {
    white-space: nowrap;
    color: var(--text-dim);
    font-size: 13px;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .purchased-row label {
    display: flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    color: var(--text-dim);
    white-space: nowrap;
  }
  .purchased-row .qty-cell {
    white-space: nowrap;
    color: var(--text-dim);
    font-size: 13px;
  }
  .purchased-row .amt-cell {
    text-align: left;
    white-space: nowrap;
    color: var(--text-dim);
    font-size: 13px;
  }
  .purchased-row .revert-btn { justify-self: end; }
  @media (max-width: 640px) {
    .purchased-row {
      grid-template-columns: auto 1fr 1fr;
      row-gap: 6px;
    }
    .purchased-row .item-cell,
    .purchased-row .store-cell,
    .purchased-row .client-cell {
      grid-column: 1 / -1;
      white-space: normal;
    }
  }
  .tag {
    font-size: 11px;
    padding: 1px 6px;
    border-radius: 6px;
    background: var(--primary-dim);
    color: var(--primary);
  }
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1000;
    padding: 16px;
  }
  .modal-box {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px;
    max-width: 480px;
    width: 100%;
    max-height: 80vh;
    overflow-y: auto;
  }
  .top-actions { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; margin-bottom: 16px; }
  .status-line { font-size: 12px; color: var(--text-dim); margin-top: 6px; }
  .checkbox-cell { text-align: center; }
  .chip { font-size: 12px; padding: 4px 10px; background: var(--primary-dim); color: var(--primary); border-radius: 999px; }
  .chip:disabled { background: var(--bg); color: var(--text-dim); opacity: 0.6; }
  .packing-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 4px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
  }
  .packing-item:last-child { border-bottom: none; }
  .packing-item .name { flex: 1; }
  .packing-item .name.packed { text-decoration: line-through; color: var(--text-dim); }
  .del-btn { color: var(--danger); }
  ::placeholder { color: var(--text-dim); opacity: 0.6; }
  .price-input { width: 90px; display: inline-block; }
  input[type="checkbox"] { width: 18px; height: 18px; flex-shrink: 0; }
  button { min-height: 40px; }
  button.ghost { min-height: auto; }
  @media (max-width: 640px) {
    .wrap { padding: 12px 10px 60px; }
    h1 { font-size: 19px; }
    .card { padding: 12px; }
    .add-form .field { flex: 1 1 100%; }
    .add-form > button { flex: 1 1 100%; }
    input, select, button { font-size: 16px; }
    .tab-btn { padding: 10px 12px; font-size: 13px; }
    .card .row > .field[style*="max-width"] { max-width: none !important; flex: 1 1 100%; }
    .trip-meta { gap: 14px; }
    .reminder-item { flex-wrap: wrap; row-gap: 6px; }
    .reminder-item > .row { width: 100%; }
    button.ghost { padding: 6px 10px; }
    .modal-box { padding: 14px; }
    #storeModalList { gap: 12px 14px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <h1>🧳 旅遊代購與購物清單</h1>

  <div class="sticky-trip-bar">
    <select id="tripSelect"></select>
    <button class="secondary" id="btnNewTrip" title="新增行程">＋</button>
    <button class="secondary" id="btnEditTrip" title="編輯">✏️</button>
    <button class="danger" id="btnDeleteTrip" title="刪除">🗑️</button>
    <span id="tripMeta" class="trip-meta"></span>
    <span id="tripEmpty" class="muted" style="display:none;">目前沒有行程，請先新增一個行程。</span>
  </div>

  <div id="tripForm" class="card" style="display:none;">
    <h2 id="tripFormTitle">新增行程</h2>
    <div class="row">
      <div class="field">
        <label>行程名稱</label>
        <input id="f_name" placeholder="例如：2026東京賞楓">
      </div>
      <div class="field">
        <label>目的地國家</label>
        <input id="f_country" placeholder="例如：日本">
      </div>
      <div class="field">
        <label>幣別</label>
        <select id="f_currency">
          <option value="JPY">日圓 JPY</option>
          <option value="KRW">韓元 KRW</option>
          <option value="USD">美元 USD</option>
          <option value="EUR">歐元 EUR</option>
          <option value="THB">泰銖 THB</option>
          <option value="CNY">人民幣 CNY</option>
          <option value="HKD">港幣 HKD</option>
          <option value="GBP">英鎊 GBP</option>
          <option value="AUD">澳幣 AUD</option>
          <option value="VND">越南盾 VND</option>
          <option value="SGD">新加坡幣 SGD</option>
          <option value="MYR">馬來幣 MYR</option>
          <option value="PHP">菲律賓披索 PHP</option>
          <option value="IDR">印尼盾 IDR</option>
          <option value="NZD">紐幣 NZD</option>
          <option value="CAD">加幣 CAD</option>
          <option value="OTHER">其他（自訂代碼）</option>
        </select>
      </div>
      <div class="field" id="f_currency_other_wrap" style="display:none;">
        <label>自訂幣別代碼</label>
        <input id="f_currency_other" placeholder="3碼英文，例如 CHF" maxlength="3" style="text-transform:uppercase;">
      </div>
      <div class="field">
        <label>出發日期</label>
        <input id="f_date" type="date" style="cursor:pointer;">
      </div>
    </div>
    <div class="row" style="margin-top:10px;">
      <button id="btnSaveTrip">儲存</button>
      <button class="ghost" id="btnCancelTrip">取消</button>
    </div>
  </div>

  <div class="tabs">
    <button class="tab-btn active" data-tab="packing">🎒 攜帶清單</button>
    <button class="tab-btn" data-tab="itinerary">🗓️ 行程安排</button>
    <button class="tab-btn" data-tab="daigou">🛍️ 代購清單</button>
    <button class="tab-btn" data-tab="self">🛒 自己購買清單</button>
    <button class="tab-btn" data-tab="reminder">🔔 購買提醒</button>
    <button class="tab-btn" data-tab="food">🍽️ 餐廳&超商美食</button>
  </div>

  <!-- 攜帶清單 -->
  <div id="tab-packing" class="tab-panel">
    <div class="card">
      <h2>新增攜帶物品（本行程）</h2>
      <div class="add-form">
        <div class="field grow">
          <label>物品名稱</label>
          <input id="p_item" placeholder="例如：護照">
        </div>
        <button id="btnAddPacking">新增</button>
      </div>
      <div class="row" id="packingQuickAdd" style="margin-top:4px; gap:6px;"></div>
    </div>
    <div class="card">
      <h2>攜帶清單</h2>
      <div id="packingListWrap"></div>
    </div>
  </div>

  <!-- 行程安排 -->
  <div id="tab-itinerary" class="tab-panel" style="display:none;">
    <div class="card">
      <h2>新增行程項目</h2>
      <div class="add-form">
        <div class="field" style="max-width:90px;">
          <label>第幾天</label>
          <input id="it_day" type="number" min="1" step="1" value="1">
        </div>
        <div class="field" style="max-width:100px;">
          <label>時間（選填，24H）</label>
          <input id="it_time" placeholder="1400 或 14:00">
        </div>
        <div class="field grow">
          <label>地點/活動</label>
          <input id="it_place" placeholder="例如：小鹿街">
        </div>
        <button id="btnAddItinerary">新增</button>
      </div>
      <div class="row" style="align-items:center; gap:10px; margin-top:4px;">
        <span class="muted" style="font-size:13px;">這裡有的店家（選填）</span>
        <button type="button" class="secondary" data-action="open-store-modal" data-target="add">🏬 選擇店家</button>
        <span id="it_storesSummary" class="muted" style="font-size:12px;">尚未選擇</span>
      </div>
    </div>
    <div id="itineraryContent"></div>
  </div>

  <!-- 代購清單 -->
  <div id="tab-daigou" class="tab-panel" style="display:none;">
    <div class="card">
      <h2>新增代購項目</h2>
      <div class="muted" style="margin-bottom:10px;">先輸入要買什麼，單價到「🔔 購買提醒」現場購買時再輸入</div>
      <div class="add-form">
        <div class="field grow">
          <label>委託人/客戶</label>
          <input id="d_client" placeholder="姓名">
        </div>
        <div class="field grow">
          <label>店名（選填）</label>
          <input id="d_store" list="d_storeList" placeholder="例如：GU">
          <datalist id="d_storeList"></datalist>
        </div>
        <div class="field grow">
          <label>商品名稱</label>
          <input id="d_item" placeholder="商品名稱">
        </div>
        <div class="field">
          <label>數量</label>
          <input id="d_qty" type="number" min="1" step="1" value="1">
        </div>
        <div class="field">
          <label>代購費(台幣)</label>
          <input id="d_fee" type="number" min="0" step="1" placeholder="0">
        </div>
        <button id="btnAddDaigou">新增</button>
      </div>
    </div>
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <h2 style="margin:0;">代購明細</h2>
        <div class="field" style="max-width:240px;">
          <label>依委託人查詢（跨所有行程）</label>
          <select id="d_clientFilter">
            <option value="">本行程全部項目</option>
          </select>
        </div>
      </div>
      <div id="daigouTableWrap"></div>
      <div id="daigouSummary" class="status-line"></div>
    </div>
  </div>

  <!-- 自己購買清單 -->
  <div id="tab-self" class="tab-panel" style="display:none;">
    <div class="card">
      <h2>新增自購項目</h2>
      <div class="muted" style="margin-bottom:10px;">先輸入要買什麼，單價到「🔔 購買提醒」現場購買時再輸入</div>
      <div class="add-form">
        <div class="field grow">
          <label>店名（選填）</label>
          <input id="s_store" list="s_storeList" placeholder="例如：唐吉訶德">
          <datalist id="s_storeList"></datalist>
        </div>
        <div class="field grow">
          <label>商品名稱</label>
          <input id="s_item" placeholder="商品名稱">
        </div>
        <div class="field">
          <label>數量</label>
          <input id="s_qty" type="number" min="1" step="1" value="1">
        </div>
        <button id="btnAddSelf">新增</button>
      </div>
    </div>
    <div class="card">
      <h2>自購明細</h2>
      <div id="selfTableWrap"></div>
      <div id="selfSummary" class="status-line"></div>
    </div>
  </div>

  <!-- 購買提醒 -->
  <div id="tab-reminder" class="tab-panel" style="display:none;">
    <div class="card">
      <div class="row" style="justify-content:space-between;">
        <h2 style="margin:0;">尚未購買提醒（含代購與自購，跨所有行程）</h2>
        <div class="field" style="max-width:240px;">
          <label>依委託人查詢（跨所有行程）</label>
          <select id="rm_clientFilter">
            <option value="">全部（含自購）</option>
          </select>
        </div>
      </div>
      <div id="reminderContent"></div>
    </div>
  </div>

  <!-- 餐廳＆超商美食 -->
  <div id="tab-food" class="tab-panel" style="display:none;">
    <div class="card">
      <h2>新增餐飲紀錄</h2>
      <div class="add-form">
        <div class="field grow">
          <label>店名</label>
          <input id="fd_store" list="fd_storeList" placeholder="例如：一蘭拉麵、7-11">
          <datalist id="fd_storeList"></datalist>
        </div>
        <div class="field grow">
          <label>品項</label>
          <input id="fd_item" placeholder="例如：拉麵、飯糰">
        </div>
        <div class="field">
          <label>類型</label>
          <select id="fd_type">
            <option value="restaurant">🍽️ 餐廳</option>
            <option value="conbini">🏪 超商</option>
          </select>
        </div>
        <div class="field">
          <label>價錢（原幣，選填）</label>
          <input id="fd_price" type="number" min="0" step="0.01" placeholder="待輸入">
        </div>
        <button id="btnAddFood">新增</button>
      </div>
    </div>
    <div class="card">
      <h2>餐飲明細</h2>
      <div id="foodTableWrap"></div>
      <div id="foodSummary" class="status-line"></div>
    </div>
  </div>

</div>

<div id="storeModalOverlay" class="modal-overlay" style="display:none;">
  <div class="modal-box">
    <div class="row" style="justify-content:space-between; align-items:center;">
      <h2 style="margin:0;">選擇店家</h2>
      <button class="ghost" data-action="close-store-modal">✕</button>
    </div>
    <div id="storeModalList" style="margin:12px 0; display:flex; flex-wrap:wrap; gap:10px 16px; max-height:50vh; overflow-y:auto;"></div>
    <div class="row" style="justify-content:flex-end; gap:8px;">
      <button class="secondary" data-action="close-store-modal">取消</button>
      <button data-action="confirm-store-modal">確定</button>
    </div>
  </div>
</div>

<script>
(function () {
  "use strict";

  var STORAGE_KEY = "travel_shopping_data_v1";
  var RATE_CACHE_KEY_PREFIX = "travel_rate_cache_";

  /** @type {{trips: any[], daigouItems: any[], selfItems: any[]}} */
  var data = loadData();
  var state = {
    currentTripId: data.trips.length ? data.trips[0].id : null,
    activeTab: "packing",
    editingTripId: null,
    editingDaigouId: null,
    editingSelfId: null,
    editingFoodId: null,
    editingItineraryId: null,
    storeModalTarget: null,
    itineraryStoreSelections: {},
    showManualRate: false
  };

  function loadData() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      if (raw) {
        var parsed = JSON.parse(raw);
        parsed.trips = parsed.trips || [];
        parsed.daigouItems = parsed.daigouItems || [];
        parsed.selfItems = parsed.selfItems || [];
        parsed.packingItems = parsed.packingItems || [];
        parsed.foodItems = parsed.foodItems || [];
        parsed.itineraryItems = parsed.itineraryItems || [];
        return parsed;
      }
    } catch (e) {
      console.warn("讀取本機資料失敗，將重新初始化", e);
    }
    return { trips: [], daigouItems: [], selfItems: [], packingItems: [], foodItems: [], itineraryItems: [] };
  }

  function saveData() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 8);
  }

  function pad2(n) {
    return (n < 10 ? "0" : "") + n;
  }

  function normalizeTime24(raw) {
    raw = (raw || "").trim();
    if (!raw) return { ok: true, value: "" };
    var h, mi;
    var colonMatch = raw.match(/^(\d{1,2}):(\d{1,2})$/);
    var digitsMatch = raw.match(/^(\d{1,4})$/);
    if (colonMatch) {
      h = parseInt(colonMatch[1], 10);
      mi = parseInt(colonMatch[2], 10);
    } else if (digitsMatch) {
      var digits = digitsMatch[1];
      if (digits.length <= 2) {
        h = parseInt(digits, 10);
        mi = 0;
      } else {
        h = parseInt(digits.slice(0, -2), 10);
        mi = parseInt(digits.slice(-2), 10);
      }
    } else {
      return { ok: false };
    }
    if (isNaN(h) || isNaN(mi) || h < 0 || h > 23 || mi < 0 || mi > 59) return { ok: false };
    return { ok: true, value: pad2(h) + ":" + pad2(mi) };
  }

  function escapeHtml(str) {
    return String(str == null ? "" : str).replace(/[&<>"']/g, function (c) {
      return ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" })[c];
    });
  }

  function fmtMoney(n) {
    if (isNaN(n)) return "0";
    return Math.round(n).toLocaleString("zh-TW");
  }

  function getTrip(id) {
    return data.trips.find(function (t) { return t.id === id; });
  }

  // ---------- 匯率 ----------
  function rateCacheKey(currency) {
    return RATE_CACHE_KEY_PREFIX + currency.toUpperCase();
  }

  function getCachedRate(currency) {
    try {
      var raw = localStorage.getItem(rateCacheKey(currency));
      if (raw) return JSON.parse(raw);
    } catch (e) {}
    return null;
  }

  function setCachedRate(currency, rate) {
    localStorage.setItem(rateCacheKey(currency), JSON.stringify({
      rate: rate, updatedAt: new Date().toISOString()
    }));
  }

  function fetchWithTimeout(url, ms) {
    var controller = new AbortController();
    var timer = setTimeout(function () { controller.abort(); }, ms || 8000);
    return fetch(url, { signal: controller.signal }).finally(function () {
      clearTimeout(timer);
    });
  }

  function fetchExchangeRate(currency) {
    currency = (currency || "").toUpperCase();
    if (!currency) return Promise.reject(new Error("幣別未設定"));
    if (currency === "TWD") return Promise.resolve(1);
    if (navigator.onLine === false) return Promise.reject(new Error("目前離線"));
    return fetchWithTimeout("https://open.er-api.com/v6/latest/" + encodeURIComponent(currency))
      .then(function (res) {
        if (!res.ok) throw new Error("API 回應失敗");
        return res.json();
      })
      .then(function (json) {
        if (json.result !== "success" || !json.rates || typeof json.rates.TWD !== "number") {
          throw new Error("匯率資料格式異常");
        }
        setCachedRate(currency, json.rates.TWD);
        return json.rates.TWD;
      });
  }

  function refreshTripRate(trip, opts) {
    opts = opts || {};
    return fetchExchangeRate(trip.currency).then(function (rate) {
      trip.exchangeRate = rate;
      trip.rateUpdatedAt = new Date().toISOString();
      trip.rateSource = "auto";
      saveData();
      renderAll();
      return rate;
    }).catch(function (err) {
      var cached = getCachedRate(trip.currency);
      if (cached) {
        trip.exchangeRate = cached.rate;
        trip.rateUpdatedAt = cached.updatedAt;
        trip.rateSource = "cache";
        saveData();
        renderAll();
      } else if (!opts.silent) {
        alert("自動取得匯率失敗（可能離線或該幣別代碼不支援），請手動輸入匯率。\n" + err.message);
      }
      throw err;
    });
  }

  // ---------- 行程 ----------
  function renderTripSelect() {
    var sel = document.getElementById("tripSelect");
    sel.innerHTML = "";
    data.trips.forEach(function (t) {
      var opt = document.createElement("option");
      opt.value = t.id;
      opt.textContent = t.name + "（" + t.country + " · " + t.currency + "）";
      if (t.id === state.currentTripId) opt.selected = true;
      sel.appendChild(opt);
    });
    var hasTrips = data.trips.length > 0;
    document.getElementById("tripEmpty").style.display = hasTrips ? "none" : "block";
    document.getElementById("btnEditTrip").disabled = !hasTrips;
    document.getElementById("btnDeleteTrip").disabled = !hasTrips;
  }

  function daysUntil(dateStr) {
    if (!dateStr) return null;
    var target = new Date(dateStr + "T00:00:00");
    var today = new Date();
    today.setHours(0, 0, 0, 0);
    var diff = Math.round((target - today) / 86400000);
    return diff;
  }

  var WEEKDAY_LABELS = ["日", "一", "二", "三", "四", "五", "六"];

  function formatDayDate(departureDate, dayNum) {
    if (!departureDate) return "";
    var d = new Date(departureDate + "T00:00:00");
    d.setDate(d.getDate() + (dayNum - 1));
    return (d.getMonth() + 1) + "/" + d.getDate() + "（週" + WEEKDAY_LABELS[d.getDay()] + "）";
  }

  function renderTripMeta() {
    var box = document.getElementById("tripMeta");
    var trip = getTrip(state.currentTripId);
    if (!trip) { box.innerHTML = ""; return; }

    var rateText = trip.exchangeRate ? ("1 " + trip.currency + " ≈ " + trip.exchangeRate.toFixed(4) + " TWD") : "尚未取得匯率";
    var rateUpdated = trip.rateUpdatedAt ? new Date(trip.rateUpdatedAt).toLocaleString("zh-TW") : "—";
    var d = daysUntil(trip.departureDate);
    var dText = trip.departureDate ? (d > 0 ? ("還有 " + d + " 天") : (d === 0 ? "今天出發！" : "已出發")) : "未設定";

    box.innerHTML =
      '<span class="tm-piece"><span class="muted">目的地</span> <b>' + escapeHtml(trip.country) + '</b></span>' +
      '<span class="tm-piece"><span class="muted">出發</span> <b>' + (trip.departureDate ? escapeHtml(trip.departureDate) : "—") + '</b> <span class="muted">' + dText + '</span></span>' +
      '<span class="tm-piece"><span class="muted">匯率</span> <b>' + rateText + '</b> <span class="muted">' + rateUpdated + (trip.rateSource === "cache" ? "（快取）" : "") + '</span></span>' +
      (state.showManualRate
        ? '<input type="number" step="0.0001" min="0" id="manualRateInput" value="' + (trip.exchangeRate || "") + '" placeholder="手動匯率" style="max-width:110px;">' +
          '<button class="secondary" id="btnManualRate">套用</button>' +
          '<button class="ghost" id="btnCancelManualRate">取消</button>'
        : '<button class="ghost" id="btnToggleManualRate">✏️ 手動輸入匯率</button>'
      ) +
      '<button class="secondary" id="btnRefreshRate">🔄 重新抓取</button>';

    if (state.showManualRate) {
      document.getElementById("btnManualRate").onclick = function () {
        var v = parseFloat(document.getElementById("manualRateInput").value);
        if (isNaN(v) || v <= 0) { alert("請輸入有效的匯率數字"); return; }
        trip.exchangeRate = v;
        trip.rateUpdatedAt = new Date().toISOString();
        trip.rateSource = "manual";
        state.showManualRate = false;
        saveData();
        renderAll();
      };
      document.getElementById("btnCancelManualRate").onclick = function () {
        state.showManualRate = false;
        renderAll();
      };
    } else {
      document.getElementById("btnToggleManualRate").onclick = function () {
        state.showManualRate = true;
        renderAll();
      };
    }
    document.getElementById("btnRefreshRate").onclick = function () {
      refreshTripRate(trip).catch(function () {});
    };
  }

  function updateCurrencyOtherVisibility() {
    var sel = document.getElementById("f_currency");
    var wrap = document.getElementById("f_currency_other_wrap");
    wrap.style.display = sel.value === "OTHER" ? "block" : "none";
  }

  function setCurrencySelectValue(currency) {
    var sel = document.getElementById("f_currency");
    var hasOption = Array.prototype.some.call(sel.options, function (o) { return o.value === currency; });
    if (hasOption) {
      sel.value = currency;
      document.getElementById("f_currency_other").value = "";
    } else {
      sel.value = "OTHER";
      document.getElementById("f_currency_other").value = currency;
    }
    updateCurrencyOtherVisibility();
  }

  function showTripForm(editing) {
    state.editingTripId = editing ? state.currentTripId : null;
    var form = document.getElementById("tripForm");
    var title = document.getElementById("tripFormTitle");
    if (editing) {
      var trip = getTrip(state.currentTripId);
      title.textContent = "編輯行程";
      document.getElementById("f_name").value = trip.name;
      document.getElementById("f_country").value = trip.country;
      setCurrencySelectValue(trip.currency);
      document.getElementById("f_date").value = trip.departureDate || "";
    } else {
      title.textContent = "新增行程";
      document.getElementById("f_name").value = "";
      document.getElementById("f_country").value = "";
      setCurrencySelectValue("JPY");
      document.getElementById("f_date").value = "";
    }
    form.style.display = "block";
  }

  function hideTripForm() {
    document.getElementById("tripForm").style.display = "none";
    state.editingTripId = null;
  }

  function saveTripForm() {
    var name = document.getElementById("f_name").value.trim();
    var country = document.getElementById("f_country").value.trim();
    var currencySel = document.getElementById("f_currency").value;
    var currency = currencySel === "OTHER"
      ? document.getElementById("f_currency_other").value.trim().toUpperCase()
      : currencySel;
    var date = document.getElementById("f_date").value;

    if (!name || !country || !currency) {
      alert("請填寫行程名稱、目的地國家、幣別代碼");
      return;
    }
    if (!/^[A-Z]{3}$/.test(currency)) {
      alert("幣別代碼請輸入3個英文字母，例如 JPY、KRW、USD、EUR");
      return;
    }

    if (state.editingTripId) {
      var trip = getTrip(state.editingTripId);
      var currencyChanged = trip.currency !== currency;
      trip.name = name;
      trip.country = country;
      trip.currency = currency;
      trip.departureDate = date;
      saveData();
      hideTripForm();
      renderAll();
      if (currencyChanged) refreshTripRate(trip, { silent: true }).catch(function () {});
    } else {
      var newTrip = {
        id: uid(),
        name: name,
        country: country,
        currency: currency,
        departureDate: date,
        exchangeRate: null,
        rateUpdatedAt: null,
        rateSource: null,
        createdAt: new Date().toISOString()
      };
      data.trips.push(newTrip);
      state.currentTripId = newTrip.id;
      saveData();
      hideTripForm();
      renderAll();
      var cached = getCachedRate(currency);
      if (cached) {
        newTrip.exchangeRate = cached.rate;
        newTrip.rateUpdatedAt = cached.updatedAt;
        newTrip.rateSource = "cache";
        saveData();
        renderAll();
      }
      refreshTripRate(newTrip, { silent: true }).catch(function () {});
    }
  }

  function deleteCurrentTrip() {
    var trip = getTrip(state.currentTripId);
    if (!trip) return;
    if (!confirm('確定要刪除行程「' + trip.name + '」嗎？此行程底下的代購、自購、攜帶清單、餐飲紀錄與行程安排也會一併刪除，此動作無法復原。')) return;
    data.trips = data.trips.filter(function (t) { return t.id !== trip.id; });
    data.daigouItems = data.daigouItems.filter(function (it) { return it.tripId !== trip.id; });
    data.selfItems = data.selfItems.filter(function (it) { return it.tripId !== trip.id; });
    data.packingItems = data.packingItems.filter(function (it) { return it.tripId !== trip.id; });
    data.foodItems = data.foodItems.filter(function (it) { return it.tripId !== trip.id; });
    data.itineraryItems = data.itineraryItems.filter(function (it) { return it.tripId !== trip.id; });
    state.currentTripId = data.trips.length ? data.trips[0].id : null;
    saveData();
    renderAll();
  }

  // ---------- 代購清單 ----------
  function addDaigouItem() {
    var trip = getTrip(state.currentTripId);
    if (!trip) { alert("請先建立行程"); return; }
    var client = document.getElementById("d_client").value.trim();
    var store = document.getElementById("d_store").value.trim();
    var item = document.getElementById("d_item").value.trim();
    var qty = parseInt(document.getElementById("d_qty").value, 10) || 1;
    var fee = parseFloat(document.getElementById("d_fee").value) || 0;

    if (!item) {
      alert("請填寫商品名稱");
      return;
    }

    data.daigouItems.push({
      id: uid(),
      tripId: trip.id,
      client: client,
      store: store,
      item: item,
      price: null,
      qty: qty,
      fee: fee,
      purchased: false,
      delivered: false,
      paid: false,
      createdAt: new Date().toISOString()
    });
    saveData();

    document.getElementById("d_client").value = "";
    document.getElementById("d_store").value = "";
    document.getElementById("d_item").value = "";
    document.getElementById("d_qty").value = "1";
    document.getElementById("d_fee").value = "";

    renderAll();
  }

  function getDistinctClients() {
    return Array.from(new Set(
      data.daigouItems.map(function (it) { return it.client; }).filter(function (c) { return c; })
    )).sort(function (a, b) { return a.localeCompare(b, "zh-Hant"); });
  }

  function renderClientFilterOptions() {
    var clients = getDistinctClients();

    var sel = document.getElementById("d_clientFilter");
    var prevValue = sel.value;
    sel.innerHTML = '<option value="">本行程全部項目</option>' +
      clients.map(function (c) { return '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '（跨行程）</option>'; }).join("");
    if (clients.indexOf(prevValue) !== -1) sel.value = prevValue;

    var rmSel = document.getElementById("rm_clientFilter");
    var rmPrevValue = rmSel.value;
    var rmSpecialValues = ["__undelivered__", "__unpaid__", "__self__"];
    rmSel.innerHTML = '<option value="">全部</option>' +
      '<option value="__undelivered__">未交付</option>' +
      '<option value="__unpaid__">未收款</option>' +
      '<option value="__self__">自購</option>' +
      clients.map(function (c) { return '<option value="' + escapeHtml(c) + '">' + escapeHtml(c) + '</option>'; }).join("");
    if (clients.indexOf(rmPrevValue) !== -1 || rmSpecialValues.indexOf(rmPrevValue) !== -1) rmSel.value = rmPrevValue;
  }

  function buildDaigouRow(it, trip, showTripColumn, isEditing) {
    var rate = trip ? (trip.exchangeRate || 0) : 0;
    var currency = trip ? trip.currency : "?";
    var hasPrice = it.price !== null && it.price !== undefined && !isNaN(it.price);
    var subtotalForeign = hasPrice ? it.price * it.qty : 0;
    var subtotalTwd = subtotalForeign * rate;
    var receivable = hasPrice ? (subtotalTwd + it.fee) : 0;

    if (isEditing) {
      return {
        receivable: receivable,
        hasPrice: hasPrice,
        html: '<tr><td colspan="100%">' +
          '<div class="row" style="gap:10px; align-items:flex-end;">' +
            '<div class="field grow"><label>店名</label><input id="editStore_' + it.id + '" value="' + escapeHtml(it.store || "") + '"></div>' +
            '<div class="field" style="max-width:150px;"><label>單價（' + escapeHtml(currency) + '，選填）</label><input type="number" min="0" step="0.01" id="editPrice_' + it.id + '" value="' + (hasPrice ? it.price : "") + '" placeholder="輸入單價"></div>' +
            '<div class="field" style="max-width:100px;"><label>數量</label><input type="number" min="1" step="1" id="editQty_' + it.id + '" value="' + it.qty + '"></div>' +
            '<div class="field" style="max-width:140px;"><label>代購費(台幣)</label><input type="number" min="0" step="1" id="editFee_' + it.id + '" value="' + it.fee + '"></div>' +
            '<button data-action="save-daigou-edit" data-id="' + it.id + '">儲存</button>' +
            '<button class="ghost" data-action="cancel-daigou-edit" data-id="' + it.id + '">取消</button>' +
          '</div>' +
        '</td></tr>'
      };
    }

    return {
      receivable: receivable,
      hasPrice: hasPrice,
      html: '<tr>' +
        '<td>' + escapeHtml(it.client || "—") + '</td>' +
        (showTripColumn ? '<td>' + escapeHtml(trip ? trip.name : "—") + '</td>' : "") +
        '<td>' + (it.store ? escapeHtml(it.store) : '<span class="muted">—</span>') + '</td>' +
        '<td>' + escapeHtml(it.item) +
          (!hasPrice ? ' <span class="badge warn">待輸入價格</span>' : "") +
        '</td>' +
        '<td class="num">' + it.qty + '</td>' +
        '<td class="num">' + (hasPrice ? ('NT$ ' + fmtMoney(subtotalTwd)) : '—') + '</td>' +
        '<td class="num">NT$ ' + fmtMoney(it.fee) + '</td>' +
        '<td class="num">' + (hasPrice ? ('<b>NT$ ' + fmtMoney(receivable) + '</b>') : '—') + '</td>' +
        '<td class="row" style="gap:4px; flex-wrap:nowrap;">' +
          '<button class="ghost" data-action="edit-daigou" data-id="' + it.id + '">編輯</button>' +
          '<button class="ghost del-btn" data-action="delete-daigou" data-id="' + it.id + '">刪除</button>' +
        '</td>' +
      '</tr>'
    };
  }

  function renderDaigouTable() {
    var wrap = document.getElementById("daigouTableWrap");
    var summary = document.getElementById("daigouSummary");
    var clientFilter = document.getElementById("d_clientFilter").value;

    var currentTripForStores = getTrip(state.currentTripId);
    var storeNames = currentTripForStores
      ? Array.from(new Set(
          data.daigouItems.filter(function (it) { return it.tripId === currentTripForStores.id; })
            .map(function (it) { return it.store; }).filter(function (s) { return s; })
        )).sort(function (a, b) { return a.localeCompare(b, "zh-Hant"); })
      : [];
    document.getElementById("d_storeList").innerHTML =
      storeNames.map(function (s) { return '<option value="' + escapeHtml(s) + '">'; }).join("");

    var items, showTripColumn, summaryLabel;

    if (clientFilter) {
      items = data.daigouItems.filter(function (it) { return it.client === clientFilter; });
      showTripColumn = true;
      summaryLabel = '「' + clientFilter + '」跨所有行程應收總額：';
    } else {
      var trip = getTrip(state.currentTripId);
      if (!trip) { wrap.innerHTML = '<div class="empty">請先建立行程</div>'; summary.textContent = ""; return; }
      items = data.daigouItems.filter(function (it) { return it.tripId === trip.id; });
      showTripColumn = false;
      summaryLabel = "本行程代購應收總額：";
    }

    if (!items.length) {
      wrap.innerHTML = '<div class="empty">' + (clientFilter ? "找不到這位委託人的項目" : "尚未新增代購項目") + '</div>';
      summary.textContent = "";
      return;
    }

    var totalReceivable = 0;
    var unpricedCount = 0;
    var rows = items.map(function (it) {
      var itTrip = getTrip(it.tripId);
      var built = buildDaigouRow(it, itTrip, showTripColumn, it.id === state.editingDaigouId);
      totalReceivable += built.receivable;
      if (!built.hasPrice) unpricedCount++;
      return built.html;
    }).join("");

    wrap.innerHTML =
      '<table><thead><tr>' +
      '<th>委託人</th>' + (showTripColumn ? "<th>行程</th>" : "") + '<th>店名</th><th>商品</th><th class="num">數量</th>' +
      '<th class="num">台幣小計</th><th class="num">代購費</th><th class="num">應收總額</th><th></th>' +
      '</tr></thead><tbody>' + rows + '</tbody></table>';

    summary.innerHTML = summaryLabel + '<b style="color:var(--text)">NT$ ' + fmtMoney(totalReceivable) + '</b>' +
      (unpricedCount ? ('　<span class="muted">（' + unpricedCount + ' 項尚未輸入價格，未計入總額）</span>') : "");
  }

  // ---------- 自己買清單 ----------
  function addSelfItem() {
    var trip = getTrip(state.currentTripId);
    if (!trip) { alert("請先建立行程"); return; }
    var store = document.getElementById("s_store").value.trim();
    var item = document.getElementById("s_item").value.trim();
    var qty = parseInt(document.getElementById("s_qty").value, 10) || 1;

    if (!item) {
      alert("請填寫商品名稱");
      return;
    }

    data.selfItems.push({
      id: uid(),
      tripId: trip.id,
      store: store,
      item: item,
      price: null,
      qty: qty,
      purchased: false,
      createdAt: new Date().toISOString()
    });
    saveData();

    document.getElementById("s_store").value = "";
    document.getElementById("s_item").value = "";
    document.getElementById("s_qty").value = "1";

    renderAll();
  }

  function renderSelfTable() {
    var wrap = document.getElementById("selfTableWrap");
    var summary = document.getElementById("selfSummary");
    var trip = getTrip(state.currentTripId);
    if (!trip) {
      wrap.innerHTML = '<div class="empty">請先建立行程</div>';
      summary.textContent = "";
      document.getElementById("s_storeList").innerHTML = "";
      return;
    }

    var items = data.selfItems.filter(function (it) { return it.tripId === trip.id; });

    var storeNames = Array.from(new Set(items.map(function (it) { return it.store; }).filter(function (s) { return s; })))
      .sort(function (a, b) { return a.localeCompare(b, "zh-Hant"); });
    document.getElementById("s_storeList").innerHTML =
      storeNames.map(function (s) { return '<option value="' + escapeHtml(s) + '">'; }).join("");

    if (!items.length) {
      wrap.innerHTML = '<div class="empty">尚未新增自購項目</div>';
      summary.textContent = "";
      return;
    }

    var rate = trip.exchangeRate || 0;
    var totalTwd = 0;
    var unpricedCount = 0;
    var purchasedCount = 0;

    var groupOrder = [];
    var groups = {};
    items.forEach(function (it) {
      var key = it.store || "";
      if (!groups[key]) { groups[key] = []; groupOrder.push(key); }
      groups[key].push(it);
    });

    var sections = groupOrder.map(function (storeName) {
      var groupItems = groups[storeName];
      var groupTwd = 0;
      var rows = groupItems.map(function (it) {
        if (it.purchased) purchasedCount++;
        var hasPrice = it.price !== null && it.price !== undefined && !isNaN(it.price);
        var subtotalTwd = hasPrice ? it.price * it.qty * rate : 0;
        if (hasPrice) { totalTwd += subtotalTwd; groupTwd += subtotalTwd; } else { unpricedCount++; }

        if (it.id === state.editingSelfId) {
          return '<div class="reminder-item">' +
            '<div class="row" style="gap:10px; align-items:flex-end; width:100%;">' +
              '<div class="field grow"><label>店名</label><input id="editStore_' + it.id + '" value="' + escapeHtml(it.store || "") + '"></div>' +
              '<div class="field grow"><label>商品名稱</label><input id="editItem_' + it.id + '" value="' + escapeHtml(it.item) + '"></div>' +
              '<div class="field" style="max-width:150px;"><label>單價（' + escapeHtml(trip.currency) + '，選填）</label><input type="number" min="0" step="0.01" id="editPrice_' + it.id + '" value="' + (hasPrice ? it.price : "") + '" placeholder="輸入單價"></div>' +
              '<div class="field" style="max-width:100px;"><label>數量</label><input type="number" min="1" step="1" id="editQty_' + it.id + '" value="' + it.qty + '"></div>' +
              '<button data-action="save-self-edit" data-id="' + it.id + '">儲存</button>' +
              '<button class="ghost" data-action="cancel-self-edit" data-id="' + it.id + '">取消</button>' +
            '</div>' +
          '</div>';
        }
        return '<div class="reminder-item"><span class="name">' +
          escapeHtml(it.item) + (!hasPrice ? ' <span class="badge warn">待輸入價格</span>' : "") +
          '</span><span class="row" style="gap:10px;">' +
            (it.purchased ? '<span class="badge success">已購買</span>' : '<span class="badge warn">尚未購買</span>') +
            '<span class="muted">數量 ' + it.qty + (hasPrice ? ('　' + it.price.toLocaleString("zh-TW") + ' ' + trip.currency + '　NT$ ' + fmtMoney(subtotalTwd)) : '') + '</span>' +
            '<button class="ghost" data-action="edit-self" data-id="' + it.id + '">編輯</button>' +
            '<button class="ghost del-btn" data-action="delete-self" data-id="' + it.id + '">刪除</button>' +
          '</span></div>';
      }).join("");
      return '<div class="reminder-section">' +
        '<div class="row" style="justify-content:space-between; margin-bottom:4px;">' +
          '<b>' + (storeName ? escapeHtml(storeName) : "未填店名") + '</b>' +
          '<span class="muted">小計 NT$ ' + fmtMoney(groupTwd) + '</span>' +
        '</div>' +
        rows +
      '</div>';
    }).join("");

    wrap.innerHTML = sections;

    summary.innerHTML = '本行程自購總花費：<b style="color:var(--text)">NT$ ' + fmtMoney(totalTwd) + '</b>' +
      '　<span class="muted">已購買 ' + purchasedCount + ' / ' + items.length + ' 項</span>' +
      (unpricedCount ? ('　<span class="muted">（' + unpricedCount + ' 項尚未輸入價格，未計入總額）</span>') : "");
  }

  // ---------- 餐廳＆超商美食 ----------

      tripId: trip.id,

    });

    var groups = {};

  // ---------- 行程安排 ----------
  function getAllStoreNamesForCurrentTrip() {
    var trip = getTrip(state.currentTripId);
    if (!trip) return [];
    return Array.from(new Set(
      data.selfItems.filter(function (i) { return i.tripId === trip.id; }).map(function (i) { return i.store; })
        .concat(data.daigouItems.filter(function (i) { return i.tripId === trip.id; }).map(function (i) { return i.store; }))
        .concat(data.foodItems.filter(function (i) { return i.tripId === trip.id; }).map(function (i) { return i.store; }))
        .filter(function (s) { return s; })
    )).sort(function (a, b) { return a.localeCompare(b, "zh-Hant"); });
  }

  function openStoreModal(target) {
    var allStoreNames = getAllStoreNamesForCurrentTrip();
    var current = state.itineraryStoreSelections[target] || [];
    document.getElementById("storeModalList").innerHTML = allStoreNames.length
      ? allStoreNames.map(function (s) {
          var checked = current.indexOf(s) !== -1;
          return '<label style="display:flex; align-items:center; gap:6px; font-size:14px;"><input type="checkbox" value="' + escapeHtml(s) + '"' + (checked ? " checked" : "") + '> ' + escapeHtml(s) + '</label>';
        }).join("")
      : '<span class="muted">尚無店家紀錄，先在自購/代購/餐飲新增項目後這裡會出現選項</span>';
    state.storeModalTarget = target;
    document.getElementById("storeModalOverlay").style.display = "flex";
  }

  function closeStoreModal() {
    document.getElementById("storeModalOverlay").style.display = "none";
    state.storeModalTarget = null;
  }

  function confirmStoreModal() {
    var checked = Array.prototype.filter.call(
      document.getElementById("storeModalList").querySelectorAll("input[type=checkbox]"),
      function (cb) { return cb.checked; }
    ).map(function (cb) { return cb.value; });
    state.itineraryStoreSelections[state.storeModalTarget] = checked;
    closeStoreModal();
    renderAll();
  }

  function addItineraryItem() {
    var trip = getTrip(state.currentTripId);
    if (!trip) { alert("請先建立行程"); return; }
    var day = parseInt(document.getElementById("it_day").value, 10) || 1;
    var timeResult = normalizeTime24(document.getElementById("it_time").value);
    var place = document.getElementById("it_place").value.trim();
    var stores = state.itineraryStoreSelections["add"] || [];

    if (!place) {
      alert("請填寫地點/活動");
      return;
    }
    if (!timeResult.ok) {
      alert("時間格式請輸入 HH:MM，例如 14:00，或留空");
      return;
    }
    var time = timeResult.value;

    data.itineraryItems.push({
      id: uid(),
      tripId: trip.id,
      day: day,
      time: time,
      place: place,
      stores: stores,
      createdAt: new Date().toISOString()
    });
    saveData();

    document.getElementById("it_time").value = "";
    document.getElementById("it_place").value = "";
    delete state.itineraryStoreSelections["add"];

    renderAll();
  }

  function renderItineraryContent() {
    var box = document.getElementById("itineraryContent");
    var trip = getTrip(state.currentTripId);
    if (!trip) { box.innerHTML = '<div class="card"><div class="empty">請先建立行程</div></div>'; return; }

    var items = data.itineraryItems.filter(function (it) { return it.tripId === trip.id; });

    var addSelectedStores = state.itineraryStoreSelections["add"] || [];
    document.getElementById("it_storesSummary").textContent =
      addSelectedStores.length ? addSelectedStores.join("、") : "尚未選擇";

    if (!items.length) {
      box.innerHTML = '<div class="card"><div class="empty">尚未新增行程項目</div></div>';
      return;
    }

    function findRelatedReminders(it) {
      var stores = it.stores || [];
      if (!stores.length) return "";
      var toBuySelf = data.selfItems.filter(function (si) {
        return si.tripId === trip.id && !si.purchased && si.store && stores.indexOf(si.store) !== -1;
      });
      var toBuyDaigou = data.daigouItems.filter(function (di) {
        return di.tripId === trip.id && !di.purchased && di.store && stores.indexOf(di.store) !== -1;
      });
      var foodHere = data.foodItems.filter(function (fi) {
        return fi.tripId === trip.id && fi.store && stores.indexOf(fi.store) !== -1;
      });
      if (!toBuySelf.length && !toBuyDaigou.length && !foodHere.length) return "";
      var lines = [];
      if (toBuySelf.length) {
        lines.push('🛒 別忘了買：' + toBuySelf.map(function (si) { return escapeHtml(si.item) + '（' + escapeHtml(si.store) + '）'; }).join('、'));
      }
      if (toBuyDaigou.length) {
        lines.push('🛍️ 代購別忘了買：' + toBuyDaigou.map(function (di) { return escapeHtml(di.item) + '（' + escapeHtml(di.store) + (di.client ? '→' + escapeHtml(di.client) : '') + '）'; }).join('、'));
      }
      if (foodHere.length) {
        lines.push('🍽️ 這裡的美食：' + foodHere.map(function (fi) { return escapeHtml(fi.item) + '（' + escapeHtml(fi.store) + '）'; }).join('、'));
      }
      return '<div class="reminder-section" style="margin-top:6px; padding:8px 10px;">' + lines.join('<br>') + '</div>';
    }

    var dayOrder = [];
    var groups = {};
    items.forEach(function (it) {
      var key = it.day || 1;
      if (!groups[key]) { groups[key] = []; dayOrder.push(key); }
      groups[key].push(it);
    });
    dayOrder.sort(function (a, b) { return a - b; });

    box.innerHTML = dayOrder.map(function (day) {
      var dayItems = groups[day].slice().sort(function (a, b) {
        if (!a.time && !b.time) return 0;
        if (!a.time) return 1;
        if (!b.time) return -1;
        return a.time.localeCompare(b.time);
      });
      var rows = dayItems.map(function (it) {
        if (it.id === state.editingItineraryId) {
          var editSelected = state.itineraryStoreSelections[it.id] || [];
          return '<div class="reminder-item" style="flex-direction:column; align-items:stretch; gap:8px;">' +
            '<div class="row" style="gap:10px; align-items:flex-end;">' +
              '<div class="field" style="max-width:90px;"><label>第幾天</label><input type="number" min="1" step="1" id="editDay_' + it.id + '" value="' + it.day + '"></div>' +
              '<div class="field" style="max-width:100px;"><label>時間（24H）</label><input id="editTime_' + it.id + '" value="' + escapeHtml(it.time || "") + '" placeholder="1400 或 14:00"></div>' +
              '<div class="field grow"><label>地點/活動</label><input id="editPlace_' + it.id + '" value="' + escapeHtml(it.place) + '"></div>' +
            '</div>' +
            '<div class="row" style="align-items:center; gap:10px;">' +
              '<span class="muted" style="font-size:13px;">這裡有的店家</span>' +
              '<button type="button" class="secondary" data-action="open-store-modal" data-target="' + it.id + '">🏬 選擇店家</button>' +
              '<span class="muted" style="font-size:12px;">' + (editSelected.length ? escapeHtml(editSelected.join("、")) : "尚未選擇") + '</span>' +
            '</div>' +
            '<div class="row" style="gap:8px;">' +
              '<button data-action="save-itinerary-edit" data-id="' + it.id + '">儲存</button>' +
              '<button class="ghost" data-action="cancel-itinerary-edit" data-id="' + it.id + '">取消</button>' +
            '</div>' +
          '</div>';
        }
        return '<div class="reminder-item" style="flex-direction:column; align-items:stretch; gap:4px;">' +
          '<div class="row" style="justify-content:space-between; align-items:center;">' +
            '<span class="name">' + (it.time ? ('<b>' + escapeHtml(it.time) + '</b>　') : '') + escapeHtml(it.place) + '</span>' +
            '<span class="row" style="gap:6px;">' +
              '<button class="ghost" data-action="edit-itinerary" data-id="' + it.id + '">編輯</button>' +
              '<button class="ghost del-btn" data-action="delete-itinerary" data-id="' + it.id + '">刪除</button>' +
            '</span>' +
          '</div>' +
          findRelatedReminders(it) +
        '</div>';
      }).join("");
      var dateLabel = formatDayDate(trip.departureDate, day);
      return '<div class="card"><h2>Day ' + day + (dateLabel ? ('　<span class="muted" style="font-size:13px; font-weight:400;">' + dateLabel + '</span>') : '') + '</h2>' + rows + '</div>';
    }).join("");
  }

  // ---------- 攜帶清單 ----------
  var PACKING_PRESETS = ["護照", "簽證/入境資料", "手機充電器", "轉接頭", "常備藥品", "現金/信用卡", "行動電源", "盥洗用品", "換洗衣物", "雨具", "隨身WIFI/SIM卡"];

  function addPackingItem(name) {
    var trip = getTrip(state.currentTripId);
    if (!trip) { alert("請先建立行程"); return; }
    name = (name || "").trim();
    if (!name) return;
    var exists = data.packingItems.some(function (it) {
      return it.tripId === trip.id && it.name.toLowerCase() === name.toLowerCase();
    });
    if (exists) return;
    data.packingItems.push({
      id: uid(), tripId: trip.id, name: name, packed: false, createdAt: new Date().toISOString()
    });
    saveData();
    renderAll();

  function renderPackingQuickAdd() {

    var trip = getTrip(state.currentTripId);
    var existingNames = trip
      ? data.packingItems.filter(function (it) { return it.tripId === trip.id; }).map(function (it) { return it.name.toLowerCase(); })

  function renderPackingList() {
    var wrap = document.getElementById("packingListWrap");
    var trip = getTrip(state.currentTripId);
    if (!trip) { wrap.innerHTML = '<div class="empty">請先建立行程</div>'; return; }

    var items = data.packingItems.filter(function (it) { return it.tripId === trip.id; });
    if (!items.length) {
      wrap.innerHTML = '<div class="empty">尚未登記攜帶物品，點上方常用項目或自行輸入新增</div>';
      return;
    }

    wrap.innerHTML = items.map(function (it) {

        '<input type="checkbox" data-action="toggle-packed" data-id="' + it.id + '" ' + (it.packed ? "checked" : "") + '>' +
        '<span class="name' + (it.packed ? " packed" : "") + '">' + escapeHtml(it.name) + '</span>' +
        '<button class="ghost del-btn" data-action="delete-packing" data-id="' + it.id + '">刪除</button>' +
        '</div>';
    }).join("");
  }

  function renderReminder() {
    var box = document.getElementById("reminderContent");
    var rawFilter = document.getElementById("rm_clientFilter").value;
    var selfOnly = rawFilter === "__self__";
    var statusFilter = (rawFilter === "__undelivered__" || rawFilter === "__unpaid__") ? rawFilter : null;
    var clientFilter = (statusFilter || selfOnly) ? "" : rawFilter;
    var trips = data.trips.slice().sort(function (a, b) {
      var da = a.departureDate ? new Date(a.departureDate).getTime() : Infinity;
      var db = b.departureDate ? new Date(b.departureDate).getTime() : Infinity;
      return da - db;
    });

    var groups = trips.map(function (trip) {
      var toBuyDaigou = (statusFilter || selfOnly) ? [] : data.daigouItems.filter(function (it) {
        return it.tripId === trip.id && !it.purchased && (!clientFilter || it.client === clientFilter);
      });
      var toBuySelf = (statusFilter || clientFilter) ? [] : data.selfItems.filter(function (it) {
        return it.tripId === trip.id && !it.purchased;
      });
      var purchasedDaigou = selfOnly ? [] : data.daigouItems.filter(function (it) {
        if (it.tripId !== trip.id || !it.purchased) return false;
        if (statusFilter === "__undelivered__") return !it.delivered;
        if (statusFilter === "__unpaid__") return !it.paid;
        return !clientFilter || it.client === clientFilter;
      });
      var purchasedSelf = (statusFilter || clientFilter) ? [] : data.selfItems.filter(function (it) {
        return it.tripId === trip.id && it.purchased;
      });
      var count = toBuyDaigou.length + toBuySelf.length + purchasedDaigou.length + purchasedSelf.length;
      var rate = trip.exchangeRate || 0;
      var unpaidTotal = purchasedDaigou.filter(function (it) { return !it.paid; })
        .reduce(function (sum, it) { return sum + it.price * it.qty * rate + it.fee; }, 0);
      var paidTotal = purchasedDaigou.filter(function (it) { return it.paid; })
        .reduce(function (sum, it) { return sum + it.price * it.qty * rate + it.fee; }, 0);
      return {
        trip: trip, toBuyDaigou: toBuyDaigou, toBuySelf: toBuySelf,
        purchasedDaigou: purchasedDaigou, purchasedSelf: purchasedSelf,
        unpaidTotal: unpaidTotal, paidTotal: paidTotal, count: count
      };
    }).filter(function (g) { return g.count > 0; });

    if (!groups.length) {
      var emptyMsg = statusFilter === "__undelivered__" ? "目前沒有尚未交付的項目！" :
        statusFilter === "__unpaid__" ? "目前沒有尚未收款的項目！" :
        selfOnly ? "目前沒有待處理的自購項目！" :
        clientFilter ? "這位委託人目前沒有待處理項目！" : "目前所有項目都已購買且交付完成，沒有待辦提醒！";
      box.innerHTML = '<div class="empty">🎉 ' + emptyMsg + '</div>';
      return;
    }

    box.innerHTML = groups.map(function (g) {
      var d = daysUntil(g.trip.departureDate);
      var badgeClass = "success", badgeText = "未設定日期";
      if (d !== null) {
        if (d < 0) { badgeClass = "warn"; badgeText = "已出發"; }
        else if (d <= 3) { badgeClass = "danger"; badgeText = "還有 " + d + " 天"; }
        else if (d <= 7) { badgeClass = "warn"; badgeText = "還有 " + d + " 天"; }
        else { badgeClass = "success"; badgeText = "還有 " + d + " 天"; }
      }

      var rate = g.trip.exchangeRate || 0;
      var amt = function (it) { return "NT$ " + fmtMoney(it.price * it.qty * rate); };

      var daigouRows = g.toBuyDaigou.map(function (it) {
        var priced = it.price !== null && it.price !== undefined && !isNaN(it.price);
        return '<div class="reminder-item"><span class="name">' +
          '<input type="checkbox" data-action="toggle-purchased" data-id="' + it.id + '"' + (priced ? "" : " disabled title=\"請先輸入價格\"") + '>' +
          '<span class="tag">代購</span>' + escapeHtml(it.item) + (it.store ? ('　🏬 ' + escapeHtml(it.store)) : '') + (it.client ? ('　→ ' + escapeHtml(it.client)) : '') +
          '</span><span class="row" style="gap:6px;">' +
          (priced
            ? '<span class="muted">數量 ' + it.qty + '　' + amt(it) + '</span>'
            : '<span class="muted">數量 ' + it.qty + '</span><input type="number" min="0" step="0.01" class="price-input" placeholder="輸入單價" data-action="update-daigou-price" data-id="' + it.id + '">') +
          '</span></div>';
      }).join("");

      var selfRows = g.toBuySelf.map(function (it) {
        var priced = it.price !== null && it.price !== undefined && !isNaN(it.price);
        return '<div class="reminder-item"><span class="name">' +
          '<input type="checkbox" data-action="toggle-self-purchased" data-id="' + it.id + '"' + (priced ? "" : " disabled title=\"請先輸入價格\"") + '>' +
          '<span class="tag">自購</span>' + escapeHtml(it.item) +
          '</span><span class="row" style="gap:6px;">' +
          (priced
            ? '<span class="muted">數量 ' + it.qty + '　' + amt(it) + '</span>'
            : '<span class="muted">數量 ' + it.qty + '</span><input type="number" min="0" step="0.01" class="price-input" placeholder="輸入單價" data-action="update-self-price" data-id="' + it.id + '">') +
          '</span></div>';
      }).join("");

      var purchasedDaigouRows = g.purchasedDaigou.map(function (it) {
        return '<div class="purchased-row">' +
          '<span class="tag">代購</span>' +
          '<span class="item-cell">' + escapeHtml(it.item) + '</span>' +
          '<span class="store-cell">' + (it.store ? ('🏬 ' + escapeHtml(it.store)) : '') + '</span>' +
          '<span class="client-cell">' + (it.client ? ('→ ' + escapeHtml(it.client)) : '') + '</span>' +
          '<label><input type="checkbox" data-action="toggle-delivered" data-id="' + it.id + '"' + (it.delivered ? " checked" : "") + '> 已交付</label>' +
          '<label><input type="checkbox" data-action="toggle-paid" data-id="' + it.id + '"' + (it.paid ? " checked" : "") + '> 已收款</label>' +
          '<span class="qty-cell">數量 ' + it.qty + '</span>' +
          '<span class="amt-cell">' + amt(it) + '</span>' +
          '<button class="ghost revert-btn" data-action="revert-purchased" data-id="' + it.id + '">↩ 退回尚未購買</button>' +
        '</div>';
      }).join("");

      var purchasedSelfRows = g.purchasedSelf.map(function (it) {
        return '<div class="reminder-item"><span class="name">' +
          '<input type="checkbox" data-action="toggle-self-purchased" data-id="' + it.id + '" checked>' +
          '<span class="tag">自購</span>' + escapeHtml(it.item) +
          '</span><span class="muted">數量 ' + it.qty + '　' + amt(it) + '</span></div>';
      }).join("");

      var toBuySection = (daigouRows || selfRows)
        ? '<div class="reminder-section"><div class="muted" style="margin-bottom:4px;">尚未購買</div>' + daigouRows + selfRows + '</div>'
        : "";
      var purchasedSection = (purchasedDaigouRows || purchasedSelfRows)
        ? '<div class="reminder-section"><div class="muted" style="margin-bottom:4px;">已購買</div>' + purchasedDaigouRows + purchasedSelfRows + '</div>'
        : "";

      var totalsLine = '<div class="status-line">應收未收：<b style="color:var(--text)">NT$ ' + fmtMoney(g.unpaidTotal) +
        '</b>　已收款：<b style="color:var(--text)">NT$ ' + fmtMoney(g.paidTotal) + '</b></div>';

      return '<div class="reminder-group">' +
        '<h3>' + escapeHtml(g.trip.name) + ' <span class="badge ' + badgeClass + '">' + badgeText + '</span> <span class="muted">（共 ' + g.count + ' 項）</span></h3>' +
        totalsLine +
        toBuySection + purchasedSection +
        '</div>';
    }).join("");
  }

  // ---------- Tabs ----------
  function switchTab(tabName) {
    state.activeTab = tabName;
    document.querySelectorAll(".tab-btn").forEach(function (btn) {
      btn.classList.toggle("active", btn.dataset.tab === tabName);
    });
    document.querySelectorAll(".tab-panel").forEach(function (panel) {
      panel.style.display = panel.id === "tab-" + tabName ? "block" : "none";
    });
  }

  // ---------- 事件委派（表格內動態產生的按鈕/checkbox） ----------
  document.addEventListener("click", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var action = el.dataset.action;
    var id = el.dataset.id;

    if (action === "delete-daigou") {
      if (confirm("確定刪除這筆代購項目？")) {
        data.daigouItems = data.daigouItems.filter(function (it) { return it.id !== id; });
        saveData(); renderAll();
      }
    } else if (action === "delete-self") {
      if (confirm("確定刪除這筆自購項目？")) {
        data.selfItems = data.selfItems.filter(function (it) { return it.id !== id; });
        saveData(); renderAll();
      }
    } else if (action === "delete-food") {
      if (confirm("確定刪除這筆餐飲紀錄？")) {
        data.foodItems = data.foodItems.filter(function (it) { return it.id !== id; });
        saveData(); renderAll();
      }
    } else if (action === "delete-itinerary") {
      if (confirm("確定刪除這筆行程項目？")) {
        data.itineraryItems = data.itineraryItems.filter(function (it) { return it.id !== id; });
        saveData(); renderAll();
      }
    } else if (action === "open-store-modal") {
      openStoreModal(el.dataset.target);
    } else if (action === "close-store-modal") {
      closeStoreModal();
    } else if (action === "confirm-store-modal") {
      confirmStoreModal();
    } else if (action === "edit-itinerary") {
      var editingItin = data.itineraryItems.find(function (it) { return it.id === id; });
      state.itineraryStoreSelections[id] = editingItin ? (editingItin.stores || []).slice() : [];
      state.editingItineraryId = id;
      renderAll();
    } else if (action === "cancel-itinerary-edit") {
      delete state.itineraryStoreSelections[id];
      state.editingItineraryId = null;
      renderAll();
    } else if (action === "save-itinerary-edit") {
      var editItinerary = data.itineraryItems.find(function (it) { return it.id === id; });
      if (editItinerary) {
        var newDay = parseInt(document.getElementById("editDay_" + id).value, 10);
        var newTimeResult = normalizeTime24(document.getElementById("editTime_" + id).value);
        var newPlace = document.getElementById("editPlace_" + id).value.trim();
        var newStores = state.itineraryStoreSelections[id] || [];
        if (!newPlace) {
          alert("請填寫地點/活動");
          return;
        }
        if (isNaN(newDay) || newDay < 1) {
          alert("第幾天請輸入有效數字");
          return;
        }
        if (!newTimeResult.ok) {
          alert("時間格式請輸入 HH:MM，例如 14:00，或留空");
          return;
        }
        editItinerary.day = newDay;
        editItinerary.time = newTimeResult.value;
        editItinerary.place = newPlace;
        editItinerary.stores = newStores;
        delete state.itineraryStoreSelections[id];
        state.editingItineraryId = null;
        saveData(); renderAll();
      }
    } else if (action === "revert-purchased") {
      var revertItem = data.daigouItems.find(function (it) { return it.id === id; });
      if (revertItem) {
        revertItem.purchased = false;
        revertItem.delivered = false;
        saveData(); renderAll();
      }
    } else if (action === "delete-packing") {
      data.packingItems = data.packingItems.filter(function (it) { return it.id !== id; });
      saveData(); renderAll();
    } else if (action === "quick-add-packing") {
      addPackingItem(el.dataset.name);
    } else if (action === "edit-daigou") {
      state.editingDaigouId = id;
      renderAll();
    } else if (action === "cancel-daigou-edit") {
      state.editingDaigouId = null;
      renderAll();
    } else if (action === "save-daigou-edit") {
      var editItem = data.daigouItems.find(function (it) { return it.id === id; });
      if (editItem) {
        var newStore = document.getElementById("editStore_" + id).value.trim();
        var priceRaw = document.getElementById("editPrice_" + id).value.trim();
        var newPrice = priceRaw === "" ? null : parseFloat(priceRaw);
        var newQty = parseInt(document.getElementById("editQty_" + id).value, 10);
        var newFee = parseFloat(document.getElementById("editFee_" + id).value);
        if (newPrice !== null && (isNaN(newPrice) || newPrice < 0)) {
          alert("單價請輸入有效數字，或留空待輸入");
          return;
        }
        if (isNaN(newQty) || newQty < 1) {
          alert("數量請輸入有效數字");
          return;
        }
        if (isNaN(newFee) || newFee < 0) {
          alert("代購費請輸入有效數字");
          return;
        }
        editItem.store = newStore;
        editItem.price = newPrice;
        editItem.qty = newQty;
        editItem.fee = newFee;
        state.editingDaigouId = null;
        saveData(); renderAll();
      }
    } else if (action === "edit-self") {
      state.editingSelfId = id;
      renderAll();
    } else if (action === "cancel-self-edit") {
      state.editingSelfId = null;
      renderAll();
    } else if (action === "save-self-edit") {
      var editSelfItem = data.selfItems.find(function (it) { return it.id === id; });
      if (editSelfItem) {
        var newSelfStore = document.getElementById("editStore_" + id).value.trim();
        var newItemName = document.getElementById("editItem_" + id).value.trim();
        var newSelfPriceRaw = document.getElementById("editPrice_" + id).value.trim();
        var newSelfPrice = newSelfPriceRaw === "" ? null : parseFloat(newSelfPriceRaw);
        var newSelfQty = parseInt(document.getElementById("editQty_" + id).value, 10);
        if (!newItemName) {
          alert("請填寫商品名稱");
          return;
        }
        if (newSelfPrice !== null && (isNaN(newSelfPrice) || newSelfPrice < 0)) {
          alert("單價請輸入有效數字，或留空待輸入");
          return;
        }
        if (isNaN(newSelfQty) || newSelfQty < 1) {
          alert("數量請輸入有效數字");
          return;
        }
        editSelfItem.store = newSelfStore;
        editSelfItem.item = newItemName;
        editSelfItem.price = newSelfPrice;
        editSelfItem.qty = newSelfQty;
        state.editingSelfId = null;
        saveData(); renderAll();
      }
    } else if (action === "edit-food") {
      state.editingFoodId = id;
      renderAll();
    } else if (action === "cancel-food-edit") {
      state.editingFoodId = null;
      renderAll();
    } else if (action === "save-food-edit") {
      var editFoodItem = data.foodItems.find(function (it) { return it.id === id; });
      if (editFoodItem) {
        var newStore = document.getElementById("editStore_" + id).value.trim();
        var newFoodItemName = document.getElementById("editItem_" + id).value.trim();
        var newFoodType = document.getElementById("editType_" + id).value;
        var newFoodPriceRaw = document.getElementById("editPrice_" + id).value.trim();
        var newFoodPrice = newFoodPriceRaw === "" ? null : parseFloat(newFoodPriceRaw);
        if (!newFoodItemName) {
          alert("請填寫品項");
          return;
        }
        if (newFoodPrice !== null && (isNaN(newFoodPrice) || newFoodPrice < 0)) {
          alert("價錢請輸入有效數字，或留空待輸入");
          return;
        }
        editFoodItem.store = newStore;
        editFoodItem.item = newFoodItemName;
        editFoodItem.type = newFoodType;
        editFoodItem.price = newFoodPrice;
        state.editingFoodId = null;
        saveData(); renderAll();
      }
    }
  });

  document.addEventListener("change", function (e) {
    var el = e.target.closest("[data-action]");
    if (!el) return;
    var action = el.dataset.action;
    var id = el.dataset.id;
    var item;

    if (action === "toggle-purchased") {
      item = data.daigouItems.find(function (it) { return it.id === id; });
      if (item) {
        item.purchased = el.checked;
        if (!item.purchased) { item.delivered = false; item.paid = false; }
        saveData(); renderAll();
      }
    } else if (action === "toggle-delivered") {
      item = data.daigouItems.find(function (it) { return it.id === id; });
      if (item) { item.delivered = el.checked; saveData(); renderAll(); }
    } else if (action === "toggle-paid") {
      item = data.daigouItems.find(function (it) { return it.id === id; });
      if (item) { item.paid = el.checked; saveData(); renderAll(); }
    } else if (action === "toggle-self-purchased") {
      item = data.selfItems.find(function (it) { return it.id === id; });
      if (item) { item.purchased = el.checked; saveData(); renderAll(); }
    } else if (action === "toggle-packed") {
      item = data.packingItems.find(function (it) { return it.id === id; });
      if (item) { item.packed = el.checked; saveData(); renderAll(); }
    } else if (action === "update-daigou-price") {
      item = data.daigouItems.find(function (it) { return it.id === id; });
      if (item) {
        var v = el.value.trim();
        var p = v === "" ? null : parseFloat(v);
        item.price = (p !== null && (isNaN(p) || p < 0)) ? null : p;
        saveData(); renderAll();
      }
    } else if (action === "update-self-price") {
      item = data.selfItems.find(function (it) { return it.id === id; });
      if (item) {
        var v2 = el.value.trim();
        var p2 = v2 === "" ? null : parseFloat(v2);
        item.price = (p2 !== null && (isNaN(p2) || p2 < 0)) ? null : p2;
        saveData(); renderAll();
      }
    }
  });

  // ---------- 綁定固定元件事件 ----------
  document.getElementById("tripSelect").addEventListener("change", function (e) {
    state.currentTripId = e.target.value;
    renderAll();
  });
  document.getElementById("btnNewTrip").addEventListener("click", function () { showTripForm(false); });
  document.getElementById("btnEditTrip").addEventListener("click", function () { showTripForm(true); });
  document.getElementById("btnDeleteTrip").addEventListener("click", deleteCurrentTrip);
  document.getElementById("btnSaveTrip").addEventListener("click", saveTripForm);
  document.getElementById("btnCancelTrip").addEventListener("click", hideTripForm);
  document.getElementById("f_currency").addEventListener("change", updateCurrencyOtherVisibility);
  document.getElementById("f_date").addEventListener("click", function () {
    if (typeof this.showPicker === "function") {
      try { this.showPicker(); } catch (e) {}
    }
  });
  document.getElementById("btnAddDaigou").addEventListener("click", addDaigouItem);
  document.getElementById("btnAddSelf").addEventListener("click", addSelfItem);
  document.getElementById("btnAddFood").addEventListener("click", addFoodItem);
  document.getElementById("btnAddItinerary").addEventListener("click", addItineraryItem);
  document.getElementById("d_clientFilter").addEventListener("change", renderDaigouTable);
  document.getElementById("rm_clientFilter").addEventListener("change", renderReminder);
  document.getElementById("btnAddPacking").addEventListener("click", function () {
    var input = document.getElementById("p_item");
    addPackingItem(input.value);
    input.value = "";
  });
  document.getElementById("p_item").addEventListener("keydown", function (e) {
    if (e.key === "Enter") {
      addPackingItem(this.value);
      this.value = "";
    }
  });
  document.querySelectorAll(".tab-btn").forEach(function (btn) {
    btn.addEventListener("click", function () { switchTab(btn.dataset.tab); });
  });

  // ---------- 主渲染 ----------
  function renderAll() {
    renderTripSelect();
    renderTripMeta();
    renderClientFilterOptions();
    renderDaigouTable();
    renderSelfTable();
    renderReminder();
    renderPackingQuickAdd();
    renderPackingList();
    renderFoodTable();
    renderItineraryContent();
  }

  renderAll();
  switchTab("packing");
})();
</script>
</body>
</html>
